<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Generating icons... check your downloads folder!</p>
<canvas id="c"></canvas>
<script>
  function generateIcon(size) {
    const canvas = document.getElementById("c");
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext("2d");

    const cx = size / 2;
    const cy = size / 2;

    // Background — deep purple gradient with rounded corners
    const bgGrad = ctx.createLinearGradient(0, 0, size, size);
    bgGrad.addColorStop(0, "#4f46e5");
    bgGrad.addColorStop(1, "#7c3aed");
    ctx.fillStyle = bgGrad;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.22);
    ctx.fill();

    // Subtle inner glow
    const glow = ctx.createRadialGradient(cx * 0.7, cy * 0.6, 0, cx, cy, size * 0.7);
    glow.addColorStop(0, "rgba(255,255,255,0.15)");
    glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.22);
    ctx.fill();

    // Draw bold "P" with lock hole style
    ctx.fillStyle = "white";
    ctx.font = `bold ${size * 0.58}px 'Segoe UI', Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("P", cx, cy * 1.05);

    // Small lock icon at bottom-right corner
    if (size >= 48) {
      const lx = size * 0.68;
      const ly = size * 0.65;
      const lbw = size * 0.22;
      const lbh = size * 0.16;

      // Lock body
      ctx.fillStyle = "#fbbf24";
      ctx.beginPath();
      ctx.roundRect(lx - lbw / 2, ly, lbw, lbh, size * 0.04);
      ctx.fill();

      // Lock shackle
      ctx.beginPath();
      ctx.strokeStyle = "#fbbf24";
      ctx.lineWidth = size * 0.05;
      ctx.lineCap = "round";
      ctx.arc(lx, ly, size * 0.075, Math.PI, 0, false);
      ctx.stroke();
    }

    // Shine overlay
    const shine = ctx.createLinearGradient(0, 0, 0, size * 0.5);
    shine.addColorStop(0, "rgba(255,255,255,0.12)");
    shine.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = shine;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.22);
    ctx.fill();

    return canvas.toDataURL("image/png");
  }

  function download(dataUrl, filename) {
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    a.click();
  }

  setTimeout(() => {
    download(generateIcon(16),  "icon16.png");
    setTimeout(() => download(generateIcon(48),  "icon48.png"),  300);
    setTimeout(() => download(generateIcon(128), "icon128.png"), 600);
  }, 500);
</script>
</body>
</html>
